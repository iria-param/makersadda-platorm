<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Events — Param Makersadda</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .event-panel{border:2px solid var(--ink);box-shadow:var(--shadow);margin-bottom:1.5rem;}
    .ep-head{background:var(--ink);color:var(--paper);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap;border-bottom:3px solid var(--orange);}
    .ep-body{padding:1.25rem;}
    .ep-meta{display:flex;flex-wrap:wrap;gap:.75rem;margin-bottom:.75rem;}
    .ep-meta-item{display:flex;align-items:center;gap:.35rem;font-size:.78rem;font-family:var(--font-mono);}
    .ep-meta-item svg{width:14px;height:14px;flex-shrink:0;}
    .checkin-box{background:var(--grey-light);border:1px solid var(--grey);padding:1rem;margin-top:1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
    .checkin-status{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:.875rem;}
    .checkin-dot{width:10px;height:10px;border-radius:50%;}
    .upcoming-tag{background:var(--teal);color:#fff;font-size:.65rem;font-weight:700;padding:.15rem .4rem;font-family:var(--font-mono);}
    .past-tag{background:var(--grey-dark);color:#fff;font-size:.65rem;font-weight:700;padding:.15rem .4rem;font-family:var(--font-mono);}
    .badge-earned{background:var(--green);color:#fff;border:1px solid var(--ink);padding:.35rem .75rem;font-size:.7rem;font-weight:700;display:inline-flex;align-items:center;gap:.35rem;}
  </style>
</head>
<body>
<nav class="nav" id="mainNav"></nav>
<div class="sidebar-layout">
  <aside class="sidebar" id="mainSidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div class="ph-label">// events + event_registrations</div>
      <div class="flex-between" style="flex-wrap:wrap;gap:.75rem;">
        <h1>My Events</h1>
        <a href="events.html" class="btn btn-primary btn-sm">Browse Events →</a>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="eventTabs">
      <button class="tab-btn active" data-tab="upcoming">Upcoming</button>
      <button class="tab-btn" data-tab="past">Past</button>
      <button class="tab-btn" data-tab="all">All Registrations</button>
    </div>

    <div id="eventsContent"><div class="loading"><div class="spinner"></div></div></div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script><script src="js/utils.js"></script>
<script src="js/auth.js"></script><script src="js/nav.js"></script><script src="js/sidebar.js"></script>
<script>
let currentUser;
let allRegistrations = [];
let currentTab = 'upcoming';

onReady(async () => {
  await renderNav();
  currentUser = await Auth.requireAuth('auth.html');
  if (!currentUser) return;
  const {data: prof} = await db.from('maker_profiles').select('*').eq('user_id', currentUser.id).single();
  renderSidebar('events', prof, currentUser);
  initTabs('eventTabs', (tab) => { currentTab = tab; renderTab(); });
  await loadRegistrations();
});

async function loadRegistrations() {
  const {data, error} = await db
    .from('event_registrations')
    .select('*, events(*)')
    .eq('user_id', currentUser.id)
    .order('registered_at', {ascending: false});

  if (error) { $('eventsContent').innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
  allRegistrations = data || [];
  renderTab();
}

function renderTab() {
  const now = new Date();
  let regs = allRegistrations;

  if (currentTab === 'upcoming') {
    regs = allRegistrations.filter(r => r.events && new Date(r.events.event_date) >= now);
  } else if (currentTab === 'past') {
    regs = allRegistrations.filter(r => r.events && new Date(r.events.event_date) < now);
  }

  if (!regs.length) {
    const emptyMsg = currentTab === 'upcoming'
      ? 'No upcoming events. <a href="events.html" class="link">Browse events →</a>'
      : currentTab === 'past'
      ? 'No past event registrations yet.'
      : 'You haven\'t registered for any events yet. <a href="events.html" class="link">Browse events →</a>';
    $('eventsContent').innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><h3>No events found</h3><p>${emptyMsg}</p></div>`;
    return;
  }

  $('eventsContent').innerHTML = regs.map(r => renderEventCard(r)).join('');
}

function renderEventCard(r) {
  const ev = r.events;
  if (!ev) return '';
  const now = new Date();
  const evDate = new Date(ev.event_date);
  const isPast = evDate < now;
  const isToday = evDate.toDateString() === now.toDateString();
  const checkedIn = !!r.checked_in_at;

  return `<div class="event-panel">
    <div class="ep-head">
      <div>
        <div class="flex-wrap gap-sm mb-1">
          ${isPast ? '<span class="past-tag">PAST</span>' : isToday ? '<span class="upcoming-tag">TODAY</span>' : '<span class="upcoming-tag">UPCOMING</span>'}
          ${statusBadge(r.status || 'registered')}
          ${ev.event_type ? `<span class="badge badge-grey">${ev.event_type.replace(/_/g,' ')}</span>` : ''}
          ${ev.credentials_issued ? '<span class="badge badge-orange">🏅 Badge Eligible</span>' : ''}
        </div>
        <div style="font-weight:800;font-size:1.05rem;">${ev.title}</div>
        ${ev.location ? `<div class="mono text-xs" style="opacity:.5;margin-top:.2rem;">📍 ${ev.location}</div>` : ''}
      </div>
      ${!isPast && !checkedIn ? `<div>
        <button class="btn btn-sm btn-teal" onclick="cancelRegistration('${r.id}')">Cancel Registration</button>
      </div>` : ''}
    </div>
    <div class="ep-body">
      <div class="ep-meta">
        <div class="ep-meta-item">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <span>${formatDate(ev.event_date)}</span>
        </div>
        ${ev.duration_hours ? `<div class="ep-meta-item">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span>${ev.duration_hours}h</span>
        </div>` : ''}
        ${ev.max_attendees ? `<div class="ep-meta-item">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span>Max ${ev.max_attendees}</span>
        </div>` : ''}
        <div class="ep-meta-item">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <span>Registered ${formatDate(r.registered_at)}</span>
        </div>
      </div>

      ${ev.description ? `<p class="text-sm text-grey mb-3">${ev.description}</p>` : ''}

      <!-- Check-in status -->
      <div class="checkin-box">
        <div class="checkin-status">
          <div class="checkin-dot" style="background:${checkedIn ? 'var(--green)' : isPast ? 'var(--grey-dark)' : 'var(--orange)'};"></div>
          <span>${checkedIn ? '✓ Checked In' : isPast ? 'Did Not Check In' : 'Not Yet Checked In'}</span>
        </div>
        ${checkedIn ? `<span class="mono text-xs text-grey">at ${formatDate(r.checked_in_at)}</span>` : ''}
        ${isToday && !checkedIn ? `<span class="badge badge-orange">Check-in opens today</span>` : ''}
      </div>

      <!-- Badge earned if credential was issued -->
      ${ev.credentials_issued && isPast && checkedIn ? `
        <div style="margin-top:.75rem;">
          <span class="badge-earned">🏅 Event Credential Earned</span>
        </div>` : ''}

      ${ev.credentials_issued && isPast && !checkedIn ? `
        <div style="margin-top:.75rem;">
          <span class="badge badge-grey text-xs">No credential — check-in required</span>
        </div>` : ''}
    </div>
  </div>`;
}

async function cancelRegistration(regId) {
  if (!confirm('Cancel this event registration?')) return;
  const {error} = await db.from('event_registrations').delete().eq('id', regId).eq('user_id', currentUser.id);
  if (error) { alert(error.message); return; }
  await loadRegistrations();
}
</script>
</body>
</html>
