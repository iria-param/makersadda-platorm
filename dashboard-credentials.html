<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credentials — Param Makersadda</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .badge-card{border:2px solid var(--ink);box-shadow:var(--shadow);padding:1.5rem;transition:transform .15s,box-shadow .15s;}
    .badge-card:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow-lg);}
    .badge-icon{width:60px;height:60px;background:var(--orange);border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:1.75rem;margin-bottom:1rem;}
    .badge-card h4{margin-bottom:.25rem;}
    .badge-card .bc-meta{font-family:var(--font-mono);font-size:.68rem;color:var(--grey-dark);margin-top:.5rem;}
    .TYPE_COLOR_completion{border-left:4px solid var(--green);}
    .TYPE_COLOR_event{border-left:4px solid var(--indigo);}
    .TYPE_COLOR_cert{border-left:4px solid var(--orange);}
  </style>
</head>
<body>
<nav class="nav" id="mainNav"></nav>
<div class="sidebar-layout">
  <aside class="sidebar" id="mainSidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div class="ph-label">// user_badges → badges</div>
      <h1>My Credentials</h1>
    </div>
    <div class="filter-row" id="filterRow">
      <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
      <button class="filter-chip" onclick="setFilter('completion',this)">Completions</button>
      <button class="filter-chip" onclick="setFilter('event',this)">Events</button>
      <button class="filter-chip" onclick="setFilter('cert',this)">Certificates</button>
    </div>
    <div id="credsGrid" class="grid-3"><div class="loading" style="grid-column:1/-1"><div class="spinner"></div></div></div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script><script src="js/utils.js"></script>
<script src="js/auth.js"></script><script src="js/nav.js"></script><script src="js/sidebar.js"></script>
<script>
let allBadges=[], currentFilter='all';
onReady(async()=>{
  await renderNav();
  const user = await Auth.requireAuth('auth.html');
  if(!user) return;
  const {data:prof}=await db.from('maker_profiles').select('*').eq('user_id',user.id).single();
  renderSidebar('credentials',prof,user);

  const {data}=await db.from('user_badges')
    .select('*, badges(name,description,tier,domain,badge_type,image_url,criteria), events(title), challenges(title)')
    .eq('user_id',user.id).order('earned_at',{ascending:false});
  allBadges=data||[];
  render();
});

function setFilter(f,btn){
  currentFilter=f;
  $$('.filter-chip').forEach(c=>c.classList.remove('active')); btn.classList.add('active');
  render();
}

function render(){
  let list=allBadges;
  if(currentFilter!=='all') list=allBadges.filter(b=>b.badges?.badge_type===currentFilter);
  if(list.length===0){
    $('credsGrid').innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🏅</div><h3>No ${currentFilter==='all'?'':currentFilter+' '}badges yet</h3><p>Complete challenges, attend events, or earn certifications.</p><a href="explorer.html" class="btn btn-primary btn-sm">Go to Explorer →</a></div>`;
    return;
  }
  const TYPE_BORDER={completion:'var(--green)',event:'var(--indigo)',cert:'var(--orange)'};
  $('credsGrid').innerHTML=list.map(b=>{
    const bg=b.badges;
    const btype=bg?.badge_type||'completion';
    return `<div class="badge-card" style="border-left:4px solid ${TYPE_BORDER[btype]||'var(--grey)'};">
      <div class="badge-icon">${bg?.image_url?`<img src="${bg.image_url}" style="width:100%;height:100%;object-fit:cover;">`:'🏅'}</div>
      <div class="flex-between mb-1">
        <span class="badge badge-${btype==='completion'?'green':btype==='event'?'indigo':'orange'}">${btype}</span>
        ${bg?.tier?`<span class="badge badge-grey">T${bg.tier}</span>`:''}
      </div>
      <h4>${bg?.name||'Badge'}</h4>
      <p class="text-sm text-grey mt-1">${bg?.description||''}</p>
      <div class="bc-meta">
        ${bg?.domain?`Domain: ${bg.domain} · `:''}
        Earned: ${formatDate(b.earned_at)}
        ${b.source_event_id&&b.events?`<br>Event: ${b.events.title}`:''}
        ${b.source_challenge_id&&b.challenges?`<br>Challenge: ${b.challenges.title}`:''}
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
