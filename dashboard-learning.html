<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Learning — Param Makersadda</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .challenge-row{display:flex;align-items:center;gap:1rem;padding:1rem;border-bottom:1px solid var(--grey);}
    .challenge-row:last-child{border-bottom:none;}
    .ch-num{width:32px;height:32px;background:var(--orange);border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.78rem;font-family:var(--font-mono);flex-shrink:0;}
    .ch-info{flex:1;}
    .ch-title{font-weight:700;font-size:.9rem;margin-bottom:.2rem;}
    .ch-meta{font-size:.72rem;font-family:var(--font-mono);color:var(--grey-dark);}
    .tier-section{margin-bottom:2.5rem;}
    .tier-section .ts-head{padding:1rem 1.25rem;border-bottom:2px solid var(--ink);display:flex;align-items:center;justify-content:space-between;}
    .submit-form{background:var(--grey-light);border:2px solid var(--ink);padding:1.25rem;margin:.5rem 1rem 1rem;}
  </style>
</head>
<body>
<nav class="nav" id="mainNav"></nav>
<div class="sidebar-layout">
  <aside class="sidebar" id="mainSidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div class="ph-label">// challenges + challenge_completions</div>
      <h1>My Learning</h1>
    </div>
    <div id="learningContent"><div class="loading"><div class="spinner"></div></div></div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script><script src="js/utils.js"></script>
<script src="js/auth.js"></script><script src="js/nav.js"></script><script src="js/sidebar.js"></script>
<script>
let currentUser, myCompletions=[];

onReady(async()=>{
  await renderNav();
  currentUser = await Auth.requireAuth('auth.html');
  if(!currentUser) return;
  const {data:prof}=await db.from('maker_profiles').select('*').eq('user_id',currentUser.id).single();
  renderSidebar('learning',prof,currentUser);
  await load();
});

async function load(){
  const [chalRes,compRes]=await Promise.all([
    db.from('challenges').select('*, challenge_steps(id,step_order,description), challenge_materials(id,material_name,quantity), challenge_skills(id,skill_name), challenge_levels(id,level_order,title)').order('tier').order('created_at'),
    db.from('challenge_completions').select('*').eq('user_id',currentUser.id),
  ]);
  const challenges=chalRes.data||[];
  myCompletions=(compRes.data||[]).map(c=>c.challenge_id);

  // Group by tier
  const byTier={1:[],2:[],3:[]};
  challenges.forEach(c=>{ if(byTier[c.tier]) byTier[c.tier].push(c); });

  const TIER_COLORS={1:'var(--orange)',2:'var(--indigo)',3:'var(--teal)'};
  const TIER_LABELS={1:'T1 — Fundamentals',2:'T2 — Problem Solving',3:'T3 — Open Innovation'};

  let html='';
  [1,2,3].forEach(tier=>{
    const list=byTier[tier];
    if(!list.length) return;
    const done=list.filter(c=>myCompletions.includes(c.id)).length;
    html+=`<div class="tier-section">
      <div class="card" style="padding:0;border-left:4px solid ${TIER_COLORS[tier]};">
        <div class="ts-head">
          <div><span class="badge badge-${tier===1?'orange':tier===2?'indigo':'teal'} mb-1">T${tier}</span> <span class="bold ml-auto" style="margin-left:.5rem;">${TIER_LABELS[tier]}</span></div>
          <span class="mono text-xs text-grey">${done}/${list.length} done</span>
        </div>
        <div class="progress" style="height:8px;border:none;border-bottom:2px solid var(--ink);border-radius:0;">
          <div class="progress-bar ${tier===2?'indigo':tier===3?'teal':''}" style="width:${list.length?Math.round(done/list.length*100):0}%"></div>
        </div>
        ${list.map((ch,i)=>{
          const isDone=myCompletions.includes(ch.id);
          return `<div class="challenge-row">
            <div class="ch-num" style="background:${isDone?'var(--green)':'var(--orange)'}">${isDone?'✓':(i+1)}</div>
            <div class="ch-info">
              <div class="ch-title">${ch.title}</div>
              <div class="ch-meta">
                ${ch.domain?`${ch.domain} · `:''}
                ${ch.time_estimate?`⏱ ${ch.time_estimate}`:''}
                ${ch.challenge_steps?.length?` · ${ch.challenge_steps.length} steps`:''}
                ${ch.challenge_skills?.length?` · ${ch.challenge_skills.map(s=>s.skill_name).join(', ')}`:''}
              </div>
            </div>
            ${isDone
              ?`<span class="badge badge-green">Completed</span>`
              :`<button class="btn btn-sm btn-primary" onclick="openSubmit('${ch.id}','${ch.title.replace(/'/g,"\\'")}')">Submit →</button>`}
          </div>
          <div id="submit-${ch.id}" class="submit-form hidden">
            <div class="form-group"><label class="form-label">Submission Notes</label>
              <textarea id="notes-${ch.id}" class="form-textarea" placeholder="Describe your work, what you built, what you learned..." rows="3"></textarea></div>
            <div style="display:flex;gap:.5rem;">
              <button class="btn btn-teal btn-sm" onclick="submitCompletion('${ch.id}')">Mark Complete →</button>
              <button class="btn btn-ghost btn-sm" onclick="closeSubmit('${ch.id}')">Cancel</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  if(!html) html=`<div class="empty-state"><div class="empty-icon">📡</div><h3>No challenges yet</h3><p>Ask an admin to add challenges to the Explorer Hub.</p><a href="explorer.html" class="btn btn-primary btn-sm">Browse Explorer →</a></div>`;
  $('learningContent').innerHTML=html;
}

function openSubmit(id,title){ hide($(`submit-${id}`)===null?null:null); show($('submit-'+id)); }
function closeSubmit(id){ hide($('submit-'+id)); }

async function submitCompletion(challengeId){
  const notes=$('notes-'+challengeId).value.trim();
  const {error}=await db.from('challenge_completions').insert({
    user_id:currentUser.id, challenge_id:challengeId,
    completed_at:new Date().toISOString(), submission_notes:notes||null
  });
  if(error){ alert(error.message); return; }
  await load();
}
</script>
</body>
</html>
